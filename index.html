<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>갱&현 후쿠오카 미식투어</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#111;--text:#e8e4df;--muted:#8a8580;--accent:#e07c24}
html,body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}

/* HERO */
.hero{position:relative;height:100vh;height:100svh;display:flex;align-items:center;justify-content:center;overflow:hidden;background:linear-gradient(135deg,#1a0a00 0%,#0f0f0f 50%,#0a0a1a 100%)}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 30% 40%,rgba(224,124,36,0.1) 0%,transparent 60%),radial-gradient(circle at 70% 60%,rgba(155,89,182,0.07) 0%,transparent 50%)}
.hero-inner{text-align:center;z-index:1;padding:2rem}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(2.8rem,9vw,6rem);font-weight:900;background:linear-gradient(135deg,#e07c24,#f1c40f,#e07c24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;margin-bottom:0.8rem}
.hero .sub{font-size:clamp(0.9rem,2.5vw,1.3rem);color:var(--muted);font-weight:300;letter-spacing:0.1em}
.hero .dates{margin-top:1.5rem;display:inline-flex;gap:0.8rem;padding:0.7rem 1.8rem;border:1px solid rgba(224,124,36,0.3);border-radius:50px;font-size:clamp(0.75rem,2vw,0.85rem);color:var(--accent)}
.hero .arrow{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);animation:bounce 2s infinite;color:var(--muted);font-size:0.75rem;letter-spacing:0.15em;cursor:pointer}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-8px)}}

/* APP SECTION */
.app{display:none}
.app.show{display:block}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:9999;display:flex;background:rgba(17,17,17,0.97);border-bottom:1px solid #333;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.nav-btn{flex:1;padding:11px 4px;text-align:center;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:3px solid transparent;transition:all 0.2s}
.nav-btn.on{color:var(--accent);font-weight:700;border-bottom-color:var(--accent)}

/* MAP */
#map{width:100%;height:35vh;margin-top:46px}

/* CONTENT */
.content{padding:14px;padding-bottom:80px}
.sec{display:none}.sec.on{display:block}
.dh{font-size:17px;font-weight:900;color:var(--accent);margin-bottom:3px}
.ds{font-size:11px;color:var(--muted);margin-bottom:14px;line-height:1.6}

/* STOPS */
.st{display:flex;gap:8px;padding:9px 6px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:background 0.15s}
.st:active,.st.on{background:rgba(224,124,36,0.07);border-color:rgba(224,124,36,0.25)}
.sl{display:flex;flex-direction:column;align-items:center;min-width:46px}
.st-t{font-size:10px;font-weight:700;color:var(--muted);margin-bottom:3px}
.st-d{width:9px;height:9px;border-radius:50%;border:2px solid var(--accent);background:var(--bg);flex-shrink:0}
.st-l{width:1.5px;flex:1;background:#2a2a2a;margin-top:3px}
.st:last-child .st-l{display:none}
.sr{flex:1;min-width:0}
.sn{font-size:13px;font-weight:700;margin-bottom:1px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.so{font-size:10px;color:var(--muted);margin-bottom:2px}
.sm{font-size:11px;color:#999;line-height:1.45}

/* TAGS */
.tg{display:inline-block;padding:1px 6px;border-radius:8px;font-size:9px;font-weight:700;white-space:nowrap}
.t-meal{background:rgba(224,124,36,0.15);color:#e07c24}
.t-cafe{background:rgba(107,158,61,0.15);color:#6b9e3d}
.t-move{background:rgba(90,127,191,0.15);color:#5a7fbf}
.t-free{background:rgba(196,122,63,0.15);color:#c47a3f}
.t-izakaya{background:rgba(155,89,182,0.2);color:#9b59b6}
.t-new{background:rgba(231,76,60,0.2);color:#e74c3c}
.t-star{background:rgba(241,196,15,0.2);color:#f1c40f}
.d-meal{border-color:#e07c24}.d-cafe{border-color:#6b9e3d}.d-move{border-color:#5a7fbf}
.d-free{border-color:#c47a3f}.d-izakaya{border-color:#9b59b6}.d-new{border-color:#e74c3c}.d-star{border-color:#f1c40f}

/* CHECKLIST */
.ct{font-size:17px;font-weight:900;color:var(--accent);margin-bottom:14px;text-align:center}
.ci{display:flex;align-items:flex-start;gap:10px;padding:11px 0;border-bottom:1px solid #222}
.ci input{width:20px;height:20px;accent-color:var(--accent);flex-shrink:0;margin-top:1px}
.ci b{font-size:12px;display:block;margin-bottom:1px}
.ci span{font-size:10px;color:var(--muted);line-height:1.4;display:block}

/* FOOTER */
footer{text-align:center;padding:2rem;color:var(--muted);font-size:11px;border-top:1px solid #222}

/* POPUP */
.leaflet-popup-content-wrapper{background:#1a1a1a!important;color:#e8e4df!important;border-radius:8px!important;border:1px solid #333!important;box-shadow:0 4px 16px rgba(0,0,0,0.5)!important}
.leaflet-popup-tip{background:#1a1a1a!important}
.leaflet-popup-content{font-family:'Noto Sans KR',sans-serif!important;font-size:11px!important;line-height:1.4!important;margin:6px 10px!important}

/* DESKTOP */
@media(min-width:901px){
  #map{height:100vh;position:fixed;top:0;left:0;width:50%;margin-top:0}
  .nav{left:50%}
  .content{margin-left:50%;padding:20px 28px;padding-top:65px}
}
</style>
</head>
<body>

<!-- HERO -->
<div class="hero" id="heroSection">
  <div class="hero-inner">
    <h1>후쿠오카<br>미식투어</h1>
    <p class="sub">FUKUOKA GOURMET MAP</p>
    <div class="dates">
      <span>🛫 3월 12일 (목)</span>
      <span>→</span>
      <span>3월 13일 (금) 🍺</span>
    </div>
  </div>
  <div class="arrow" onclick="startApp()" style="padding:15px 40px;border:1px solid rgba(224,124,36,0.4);border-radius:50px;font-size:0.85rem;cursor:pointer">👉 일정 보기</div>
</div>

<!-- APP -->
<div class="app" id="appSection">
  <div class="nav" id="navBar">
    <div class="nav-btn on" data-t="d1">🍜 Day1 3/12목</div>
    <div class="nav-btn" data-t="d2">🍺 Day2 3/13금</div>
    <div class="nav-btn" data-t="ck">✅ 체크</div>
  </div>
  <div id="map"></div>
  <div class="content">
    <div class="sec on" id="d1">
      <div class="dh">Day 1 — 공항 → 텐진 → 🍺무사시</div>
      <div class="ds">공항9시 도착 · 하카타→나카스→텐진→와타나베도리</div>
      <div id="l1"></div>
    </div>
    <div class="sec" id="d2">
      <div class="dh">Day 2 — ⭐17:45 히키니쿠토코메</div>
      <div class="ds">사시스→모츠나베→아임도넛→예약→🍺토리카와</div>
      <div id="l2"></div>
    </div>
    <div class="sec" id="ck">
      <div class="ct">✅ 사전 체크리스트</div>
      <div id="cl"></div>
    </div>
  </div>
  <footer>후쿠오카 3박 4일 미식투어 — 맛있는 여행 되세요! 🍜🍣🍢🍩</footer>
</div>

<script>
/* DATA */
const D1=[
  {t:"09:00",g:"move",e:"✈️",n:"후쿠오카 공항 도착",l:"후쿠오카 공항",m:"짐찾기+셔틀→지하철 하카타역 (약1시간)",la:33.5859,lo:130.4508},
  {t:"10:15",g:"cafe",e:"🍞",n:"il forno del mignon",l:"하카타역 구내 1층",m:"미니 크로아상. 멘타이코·초콜릿 추천",la:33.5902,lo:130.4205},
  {t:"10:35",g:"cafe",e:"🍰",n:"후르츠가든 신선",l:"하카타역 데이토스 1층",m:"3월 딸기시즌! 딸기산도 필수",la:33.5898,lo:130.4210},
  {t:"10:45",g:"move",e:"🚶",n:"하카타역 → 우동 타이라",l:"도보 10분",m:"하카타역 남쪽 방면"},
  {t:"11:00",g:"new",e:"🆕",n:"우동 타이라",l:"하카타역 남쪽 10분",m:"NEW! 원조 후쿠오카 우동. 고보텐 추천. 런치 11~15시",la:33.5832,lo:130.4160},
  {t:"12:00",g:"move",e:"🚶",n:"타이라 → 에이토",l:"도보 15분",m:"나카스 방면 이동"},
  {t:"12:30",g:"meal",e:"🍽",n:"우나기노 에이토",l:"나카스",m:"⭐4.9 장어덮밥! 구이&찜 둘다. 대기40분~1시간",la:33.5919,lo:130.4066},
  {t:"14:00",g:"cafe",e:"🍞",n:"풀풀 하카타",l:"기온",m:"멘타이 프랑스빵 시그니처!",la:33.5899,lo:130.4125},
  {t:"15:30",g:"cafe",e:"🍰",n:"링고 애플파이",l:"텐진 지하상가",m:"오리지널 커스타드. 따뜻할 때!",la:33.5905,lo:130.3990},
  {t:"15:45",g:"free",e:"🛍",n:"텐진 자유시간",l:"텐진",m:"지하상가·다이마루·이와타야 쇼핑"},
  {t:"17:00",g:"meal",e:"🍽",n:"돈카츠 와카바",l:"텐진",m:"저온유방 튀김25분. 로스+히레세트",la:33.5926,lo:130.4022},
  {t:"19:00",g:"meal",e:"🥩",n:"야키니쿠 아카탄",l:"와타나베도리",m:"규슈 흑모와규 전문!",la:33.5885,lo:130.4027},
  {t:"21:00",g:"izakaya",e:"🍺",n:"야키토리 무사시",l:"와타나베도리",m:"🍺이자카야! 와규꼬치필수. 예약권장. 자정까지",la:33.5885,lo:130.4038}
];
const D2=[
  {t:"11:00",g:"meal",e:"🍣",n:"스시사카바 사시스",l:"KITTE하카타 B1",m:"가성비 스시! 참치롤 인기",la:33.5889,lo:130.4191},
  {t:"12:15",g:"move",e:"🚶",n:"사시스 → 라쿠텐치",l:"도보+지하철 15분",m:"텐진 방면 이동"},
  {t:"13:00",g:"new",e:"🆕",n:"모츠나베 라쿠텐치",l:"텐진 아크로스 B2",m:"NEW! ⭐4.7 원조 모츠나베. 챠폰필수",la:33.5919,lo:130.4026},
  {t:"14:30",g:"cafe",e:"🍩",n:"아임도넛",l:"와타나베도리",m:"나마도넛! ⚠️카드만(현금X)",la:33.5885,lo:130.4024},
  {t:"15:00",g:"free",e:"🛍",n:"텐진·다이묘 자유시간",l:"텐진·다이묘",m:"쇼핑·카페. 17:30에 이마이즈미로"},
  {t:"17:45",g:"star",e:"⭐",n:"히키니쿠토코메",l:"이마이즈미",m:"⭐예약17:45! 1인3개패티+밥무한리필",la:33.5836,lo:130.3991},
  {t:"18:45",g:"move",e:"🚶",n:"→ 토리카와야키 구",l:"도보+지하철 20분",m:"KITTE하카타 방면"},
  {t:"19:30",g:"izakaya",e:"🍺",n:"토리카와야키 구",l:"KITTE하카타 B1",m:"🍺이자카야! 6일구운 닭껍질. 23:30까지",la:33.5888,lo:130.4193}
];
const CK=[
  {a:"히키니쿠토코메 예약",b:"⭐ 3/13(금) 17:45 예약완료. 사전결제 확인"},
  {a:"모츠나베 라쿠텐치 예약",b:"🆕 온라인예약 가능. 13시 방문 예약권장"},
  {a:"야키토리 무사시 예약",b:"🆕 전화예약만. 워크인시 21시이후 추천"},
  {a:"우나기노 에이토",b:"예약불가. 3/12(목) 10:50 오픈런"},
  {a:"우동 타이라",b:"🆕 런치만11~15시, 일요일휴무"},
  {a:"아임도넛",b:"현금X! 카드(비자/마스터) 필수"},
  {a:"와카바 영업시간",b:"런치10:30~14:30 / 디너17:00~21:30"},
  {a:"풀풀 하카타",b:"화요일 휴무→목요일OK"},
  {a:"현금 준비",b:"야타이·우동타이라 등 현금전용"},
  {a:"교통카드",b:"스이카/파스모 또는 현지구매"}
];

const TN={meal:'식사',cafe:'카페',move:'이동',free:'자유',izakaya:'이자카야',star:'예약',new:'NEW'};
const TC={meal:'#e07c24',cafe:'#6b9e3d',move:'#5a7fbf',free:'#c47a3f',izakaya:'#9b59b6',star:'#f1c40f',new:'#e74c3c'};

/* HERO → APP */
function startApp(){
  document.getElementById('heroSection').style.display='none';
  document.getElementById('appSection').classList.add('show');
  window.scrollTo(0,0);
  setTimeout(()=>{mp.invalidateSize();show(1);},200);
}

/* BUILD LIST */
function bld(id,arr){
  const el=document.getElementById(id);
  el.innerHTML=arr.map(s=>`
    <div class="st" data-la="${s.la||''}" data-lo="${s.lo||''}">
      <div class="sl"><div class="st-t">${s.t}</div><div class="st-d d-${s.g}"></div><div class="st-l"></div></div>
      <div class="sr">
        <div class="sn">${s.e} ${s.n} <span class="tg t-${s.g}">${TN[s.g]}</span></div>
        <div class="so">${s.l}</div>
        <div class="sm">${s.m}</div>
      </div>
    </div>`).join('');
  el.querySelectorAll('.st').forEach(s=>{
    s.addEventListener('click',()=>{
      document.querySelectorAll('.st').forEach(x=>x.classList.remove('on'));
      s.classList.add('on');
      const la=parseFloat(s.dataset.la),lo=parseFloat(s.dataset.lo);
      if(la&&lo){mp.flyTo([la,lo],16,{duration:0.4});
        mk.filter(m=>{const p=m.getLatLng();return Math.abs(p.lat-la)<0.0003&&Math.abs(p.lng-lo)<0.0003;}).forEach(m=>m.openPopup());}
    });
  });
}

/* CHECKLIST */
document.getElementById('cl').innerHTML=CK.map(c=>`<div class="ci"><input type="checkbox"><div><b>${c.a}</b><span>${c.b}</span></div></div>`).join('');

/* MAP */
const mp=L.map('map',{zoomControl:false,attributionControl:false}).setView([33.589,130.408],14);
L.control.zoom({position:'bottomright'}).addTo(mp);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(mp);

let mk=[],dm={1:[],2:[]},dl={1:null,2:null};
function ic(e,c){return L.divIcon({html:`<div style="background:${c};width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;box-shadow:0 2px 6px rgba(0,0,0,0.4);border:2px solid rgba(255,255,255,0.2)">${e}</div>`,className:'',iconSize:[26,26],iconAnchor:[13,13],popupAnchor:[0,-15]});}

function addD(n,arr){
  const pts=[];
  arr.forEach(s=>{if(!s.la)return;const m=L.marker([s.la,s.lo],{icon:ic(s.e,TC[s.g]||'#888')}).bindPopup(`<b>${s.e} ${s.n}</b><br><span style="color:#8a8580;font-size:10px">${s.l}</span><br><span style="font-size:11px;color:#aaa">${s.m}</span>`);dm[n].push(m);mk.push(m);pts.push([s.la,s.lo]);});
  if(pts.length>1)dl[n]=L.polyline(pts,{color:TC[n===1?'meal':'izakaya'],weight:2,opacity:0.3,dashArray:'5,8'});
}

function show(n){
  [1,2].forEach(d=>{dm[d].forEach(m=>m.remove());if(dl[d])dl[d].remove();});
  dm[n].forEach(m=>m.addTo(mp));if(dl[n])dl[n].addTo(mp);
  const pts=(n===1?D1:D2).filter(s=>s.la).map(s=>[s.la,s.lo]);
  if(pts.length)mp.fitBounds(pts,{padding:[25,25]});
}

/* NAV */
document.querySelectorAll('.nav-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');
    const t=b.dataset.t;
    document.querySelectorAll('.sec').forEach(s=>s.classList.remove('on'));
    document.getElementById(t).classList.add('on');
    if(t==='d1')show(1);else if(t==='d2')show(2);
    window.scrollTo(0,0);
  });
});

/* INIT */
bld('l1',D1);bld('l2',D2);addD(1,D1);addD(2,D2);
window.addEventListener('resize',()=>mp.invalidateSize());
</script>
</body>
</html>
